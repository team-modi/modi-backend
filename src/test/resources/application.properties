# 테스트 전용 오버라이드(메인 application.yaml 과 병합, 충돌 키만 이 파일이 우선).
# 공공데이터 보강 스케줄러(ExhibitionSyncScheduler)를 테스트 컨텍스트에서 끈다 —
# 부팅 후 지연 실행되는 상세/장르 백필이 테스트 도중 외부 API(data.go.kr·Gemini)를 실제 호출하지 않도록.
app.exhibition.enrich.scheduling-enabled=false
# 로컬 시드 모드는 테스트 컨텍스트에서 끈다 — 켜져 있으면 모든 @SpringBootTest 기동마다 313건이 적재돼
#   각 테스트의 자체 픽스처·건수 단언을 오염시킨다. 시더 검증 테스트만 프로퍼티로 명시적으로 켠다.
app.local-seed.enabled=false
